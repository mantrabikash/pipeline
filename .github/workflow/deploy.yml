name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build -t bikashsmantra/github-actions:latest .

      - name: Push Image
        run: |
          docker push bikashsmantra/github-actions:latest

      - name: Deploy Container
        run: |
          docker pull bikashsmantra/github-actions:latest

          docker stop github-actions-app || true
          docker rm github-actions-app || true

          docker run -d \
            --name github-actions-app \
            --restart unless-stopped \
            -p 3000:3000 \
            bikashsmantra/github-actions:latest